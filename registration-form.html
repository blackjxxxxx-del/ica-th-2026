<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Conference Registration</title>

<style>

body{
font-family:Arial;
background:#f4f6fa;
margin:0;
}

.container{
max-width:800px;
margin:auto;
padding:60px 20px;
}

h1{
text-align:center;
margin-bottom:40px;
}

form{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input,select{
width:100%;
padding:12px;
margin-top:5px;
border:1px solid #ddd;
border-radius:6px;
}

button{
margin-top:25px;
padding:14px;
width:100%;
background:#0b3d91;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#082f6b;
}

</style>

</head>

<body>

<div class="container">

<h1>Conference Registration</h1>

<form>

<label>Full Name</label>
<input type="text" required>

<label>Email</label>
<input type="email" required>

<label>Institution</label>
<input type="text">

<label>Country</label>
<input type="text">

<label>Registration Type</label>
<select>
<option>Regular Participant</option>
<option>Student</option>
<option>Listener</option>
<option>Presenter</option>
</select>

<label>Upload Proof (Student ID if applicable)</label>
<input type="file">

<button type="submit">Submit Registration</button>

</form>

</div>

</body>
</html>
